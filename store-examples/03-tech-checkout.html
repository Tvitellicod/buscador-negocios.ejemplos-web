<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLT — Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Poppins', sans-serif; background: #0a0a12; color: #e8e8f0; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 6%; border-bottom: 1px solid #1c1c2e;
  }
  .logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #e8e8f0; }
  .logo span { color: #00f0c0; }
  .steps { font-size: .8rem; color: #6e6e8a; }
  .steps span.active { color: #00f0c0; font-weight: 600; }

  .checkout-wrap {
    display: grid; grid-template-columns: 1.3fr 1fr; gap: 50px;
    max-width: 1150px; margin: 0 auto; padding: 60px 6% 100px;
  }
  h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; color: #8a8aa0; }
  input {
    width: 100%; padding: 12px 14px; border: 1px solid #2a2a40; border-radius: 8px; font-size: .9rem;
    background: #12121f; color: #e8e8f0;
  }
  input::placeholder { color: #54546e; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .pago-options { display: flex; flex-direction: column; gap: 12px; margin: 18px 0 30px; }
  .pago-option {
    display: flex; align-items: center; gap: 12px; border: 1px solid #2a2a40; border-radius: 10px;
    padding: 14px 16px; cursor: pointer; background: #12121f;
  }
  .pago-option.selected { border-color: #00f0c0; }
  .pago-option input { width: auto; }
  .pago-option .info strong { display: block; font-size: .9rem; }
  .pago-option .info span { font-size: .76rem; color: #6e6e8a; }

  .card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; padding-left: 30px; }
  .card-fields .full { grid-column: 1 / -1; }

  .resumen { background: #12121f; border: 1px solid #1f1f33; border-radius: 14px; padding: 28px; align-self: start; }
  .resumen-item { display: flex; gap: 14px; margin-bottom: 16px; align-items: center; }
  .resumen-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; }
  .resumen-item .info { flex: 1; font-size: .86rem; }
  .resumen-item .info strong { display: block; margin-bottom: 4px; }
  .resumen-total { border-top: 1px solid #1f1f33; margin-top: 14px; padding-top: 14px; }
  .resumen-total .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: .9rem; color: #a8a8c0; }
  .resumen-total .row.total { color: #00f0c0; font-weight: 800; font-size: 1.15rem; margin-top: 10px; }

  .btn-confirm {
    width: 100%; margin-top: 18px; padding: 16px; border: none; border-radius: 10px; font-weight: 700; font-size: .9rem;
    background: linear-gradient(135deg,#00f0c0,#7b2ff7); color: #0a0a12; cursor: pointer;
  }
  .btn-confirm:hover { opacity: .9; }
  .seguro { text-align: center; font-size: .75rem; color: #6e6e8a; margin-top: 14px; }
</style>
</head>
<body>

  <header>
    <a class="logo" href="03-tech.html">VOLT<span>.</span></a>
    <div class="steps">Carrito → <span class="active">Datos y pago</span> → Confirmación</div>
  </header>

  <div class="checkout-wrap">
    <div>
      <h2>Datos de envío</h2>
      <div class="form-row">
        <div class="form-group"><label>Nombre</label><input type="text" placeholder="Tomás"></div>
        <div class="form-group"><label>Apellido</label><input type="text" placeholder="Gómez"></div>
      </div>
      <div class="form-group"><label>Dirección</label><input type="text" placeholder="Calle y número"></div>
      <div class="form-row">
        <div class="form-group"><label>Ciudad</label><input type="text" placeholder="Córdoba"></div>
        <div class="form-group"><label>Código Postal</label><input type="text" placeholder="5000"></div>
      </div>
      <div class="form-group"><label>Teléfono</label><input type="text" placeholder="+54 9 351 000-0000"></div>

      <h2 style="margin-top:36px;">Método de pago</h2>
      <div class="pago-options">
        <label class="pago-option selected">
          <input type="radio" name="pago" checked>
          <div class="info"><strong>🅿️ Mercado Pago</strong><span>Hasta 12 cuotas sin interés</span></div>
        </label>

        <label class="pago-option">
          <input type="radio" name="pago">
          <div class="info"><strong>💳 Tarjeta de crédito / débito</strong><span>Visa, Mastercard, Amex</span></div>
        </label>
        <div class="card-fields">
          <div class="form-group full"><label>Número de tarjeta</label><input type="text" placeholder="0000 0000 0000 0000"></div>
          <div class="form-group"><label>Vencimiento</label><input type="text" placeholder="MM/AA"></div>
          <div class="form-group"><label>CVV</label><input type="text" placeholder="123"></div>
        </div>

        <label class="pago-option">
          <input type="radio" name="pago">
          <div class="info"><strong>🏦 Transferencia bancaria</strong><span>Recibís los datos por email al confirmar</span></div>
        </label>
      </div>
    </div>

    <div class="resumen">
      <h2>Tu pedido</h2>
      <div class="resumen-item">
        <img src="https://picsum.photos/seed/volt1/150/150" alt="Producto">
        <div class="info"><strong>Auriculares inalámbricos Pro</strong>Cant. 1</div>
        <div>$71.999</div>
      </div>
      <div class="resumen-item">
        <img src="https://picsum.photos/seed/volt3/150/150" alt="Producto">
        <div class="info"><strong>Teclado mecánico RGB</strong>Cant. 1</div>
        <div>$35.999</div>
      </div>
      <div class="resumen-item">
        <img src="https://picsum.photos/seed/volt5/150/150" alt="Producto">
        <div class="info"><strong>Cargador GaN 65W</strong>Cant. 1</div>
        <div>$21.250</div>
      </div>
      <div class="resumen-total">
        <div class="row"><span>Subtotal</span><span>$129.248</span></div>
        <div class="row"><span>Envío</span><span>$4.500</span></div>
        <div class="row total"><span>Total</span><span>$133.748</span></div>
      </div>
      <button class="btn-confirm">Confirmar pedido</button>
      <p class="seguro">🔒 Pago 100% seguro y encriptado</p>
    </div>
  </div>

</body>
</html>
